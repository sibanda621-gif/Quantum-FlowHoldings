<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quantum Flow Holdings - Professional Automated Trading Dashboard">
    <meta name="theme-color" content="#00f2ff">
    <title>Quantum Flow Holdings - Trading Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-microchip me-2"></i>Quantum Flow Holdings
            </a>
            <div class="status-indicator ms-auto">
                <span class="status-dot"></span>
                <span class="small">Live Trading</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container-fluid p-4">
        <!-- Ticker Tape Section -->
        <div class="ticker-container mb-4">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async></script>
            <div class="tradingview-widget-container">
                <script type="application/json">
                    {
                        "symbols": [
                            {"proName": "FX_IDC:XAUUSD", "title": "Gold / USD"},
                            {"proName": "BITSTAMP:BTCUSD", "title": "Bitcoin / USD"},
                            {"proName": "FX:USDZAR", "title": "USD / ZAR"}
                        ],
                        "showSymbolLogo": true,
                        "colorTheme": "dark",
                        "isTransparent": true,
                        "displayMode": "adaptive",
                        "locale": "en"
                    }
                </script>
            </div>
        </div>

        <!-- Dashboard Grid -->
        <div class="row g-4">
            <!-- Chart Card -->
            <div class="col-lg-8">
                <div class="card-stat">
                    <div class="card-header">
                        <h6 class="mb-0">
                            <i class="fas fa-chart-line me-2"></i>XAUUSD - 15 MIN
                        </h6>
                    </div>
                    <div class="chart-container">
                        <div id="tradingview_chart"></div>
                    </div>
                </div>
            </div>

            <!-- Control Panel Card -->
            <div class="col-lg-4">
                <div class="card-stat">
                    <!-- Header -->
                    <div class="card-header">
                        <h5 class="text-cyan mb-0">
                            <i class="fas fa-microchip me-2"></i>Quantum Flow Core
                        </h5>
                    </div>

                    <!-- Metrics Section -->
                    <div class="flex-grow-1">
                        <!-- Market Sentiment -->
                        <div class="metric-group">
                            <div class="metric-header">
                                <small class="text-muted">Market Sentiment</small>
                                <span class="badge bg-success"><span id="sentiment-value">65</span>%</span>
                            </div>
                            <div class="progress">
                                <div 
                                    class="progress-bar bg-success" 
                                    id="sentiment-bar" 
                                    role="progressbar" 
                                    style="width: 65%;"
                                    aria-valuenow="65" 
                                    aria-valuemin="0" 
                                    aria-valuemax="100">
                                </div>
                            </div>
                            <small class="text-success d-block">Bullish (XAUUSD)</small>
                        </div>

                        <!-- Bot Latency -->
                        <div class="metric-group">
                            <div class="metric-header">
                                <small class="text-muted">Bot Latency</small>
                                <span class="badge bg-success">Optimal</span>
                            </div>
                            <h4 class="text-white">
                                <span id="latency-value">14</span>ms
                            </h4>
                        </div>

                        <!-- Active Bots -->
                        <div class="metric-group">
                            <div class="metric-header">
                                <small class="text-muted">Active Bots</small>
                                <span class="badge bg-info"><span id="active-bots">3</span></span>
                            </div>
                            <small class="text-cyan">Running</small>
                        </div>

                        <!-- Last Update -->
                        <div class="metric-group">
                            <div class="metric-header">
                                <small class="text-muted">Last Update</small>
                            </div>
                            <small class="text-muted" id="last-update">--:--:--</small>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="button-group">
                        <button 
                            class="btn btn-outline-danger w-100 mb-2" 
                            id="emergency-stop"
                            title="Stop all trading operations immediately"
                            aria-label="Emergency stop all bots">
                            <i class="fas fa-exclamation-circle me-2"></i>EMERGENCY STOP
                        </button>
                        <button 
                            class="btn btn-cyan w-100" 
                            id="view-invoices"
                            title="View client billing information"
                            aria-label="View client invoices">
                            <i class="fas fa-file-invoice me-2"></i>VIEW INVOICES
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- TradingView Chart Script -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Application Logic -->
    <script src="assets/js/app.js"></script>
</body>
</html>
